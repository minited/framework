<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><meta name="color-scheme" content="dark light"/>
<title>Tooltip</title>
<link rel="stylesheet" href="css/reset.css"/><link rel="stylesheet" href="css/core.css"/>
<link rel="stylesheet" href="css/components/header-nav.css"/><link rel="stylesheet" href="css/components/site-footer.css"/>
<link rel="stylesheet" href="css/components/buttons.css"/><link rel="stylesheet" href="css/components/tooltip.css"/>
<link rel="stylesheet" href="css/custom.css"/>
</head><body>
<a href="#main" class="skip-link">Skip to main content</a>
<header class="site-header"><div class="site-header__inner container">
<a href="#" class="site-header__brand">Framework</a>
<button type="button" class="site-header__toggle" popovertarget="site-nav" aria-label="Open menu">
<span aria-hidden="true">☰</span><span class="visually-hidden">Menu</span></button>
<nav id="site-nav" class="site-nav" popover aria-label="Main navigation">
<a href="#" class="site-nav__link">Components</a><a href="#" class="site-nav__link">Templates</a>
</nav></div></header>
<main id="main"><section class="container section stack">
<header class="section-header stack"><span class="section-header__eyebrow">Component</span>
<h1 class="section-header__title">Tooltip</h1>
<p class="section-header__intro">Add <code>data-tooltip="…"</code>. Optional <code>data-tooltip-pos</code> controls placement. Pair with <code>aria-label</code> for a11y.</p></header>
<section class="stack"><h2>Positions</h2><div class="cluster">
<button class="btn btn--secondary" data-tooltip="Top" data-tooltip-pos="top" aria-label="Top">Top</button>
<button class="btn btn--secondary" data-tooltip="Right" data-tooltip-pos="right" aria-label="Right">Right</button>
<button class="btn btn--secondary" data-tooltip="Bottom" data-tooltip-pos="bottom" aria-label="Bottom">Bottom</button>
<button class="btn btn--secondary" data-tooltip="Left" data-tooltip-pos="left" aria-label="Left">Left</button>
</div></section>
<section class="stack"><h2>On icon buttons</h2><div class="cluster">
<button class="btn btn--secondary" data-tooltip="Save" aria-label="Save">💾</button>
<button class="btn btn--secondary" data-tooltip="Delete" aria-label="Delete">🗑️</button>
<button class="btn btn--secondary" data-tooltip="Share" aria-label="Share">🔗</button>
</div></section>
</section></main>
<footer class="site-footer"><div class="container"><p class="text-muted text-center">Framework demo · Tooltip</p></div></footer>
</body></html>
