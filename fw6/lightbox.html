<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark light" />
  <title>Lightbox</title>
  <!--
  Lightbox

  This HTML file uses:
  - css/reset.css
  - css/core.css
  - css/components/lightbox.css
  - css/custom.css
  -->
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/core.css" />
  <link rel="stylesheet" href="css/components/lightbox.css" />
  <link rel="stylesheet" href="css/custom.css" />
</head>
<body>
  <a href="#main" class="skip-link">Skip to main content</a>

  <main id="main" class="container section stack">
    <header class="section-header stack">
      <span class="section-header__eyebrow">Lightbox</span>
      <h1 class="section-header__title">Lightbox only demo</h1>
      <p class="section-header__intro">This page demonstrates the lightbox component launched from ordinary buttons instead of a gallery.</p>
    </header>

    <div class="cluster">
      <button type="button" class="btn btn--primary" popovertarget="lb-single-1">Open image one</button>
      <button type="button" class="btn btn--secondary" popovertarget="lb-single-2">Open image two</button>
    </div>

    <dialog id="lb-single-1" class="lightbox" popover aria-label="Expanded image one">
      <button type="button" class="lightbox__close" popovertarget="lb-single-1" popovertargetaction="hide" aria-label="Close">✕</button>
      <figure class="lightbox__figure">
        <img class="lightbox__image" src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=1600&auto=format&fit=crop" alt="City skyline at dusk"  loading="lazy" />
        <figcaption class="lightbox__caption">City skyline at dusk reflected across the water.</figcaption>
      </figure>
    </dialog>

    <dialog id="lb-single-2" class="lightbox" popover aria-label="Expanded image two">
      <button type="button" class="lightbox__close" popovertarget="lb-single-2" popovertargetaction="hide" aria-label="Close">✕</button>
      <figure class="lightbox__figure">
        <img class="lightbox__image" src="https://images.unsplash.com/photo-1500534623283-312aade485b7?q=80&w=1600&auto=format&fit=crop" alt="Forest path in soft morning light"  loading="lazy" />
        <figcaption class="lightbox__caption">A quiet forest path framed by dense trees and soft light.</figcaption>
      </figure>
    </dialog>
  </main>
</body>
</html>
