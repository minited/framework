<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><meta name="color-scheme" content="dark light"/>
<title>Pagination</title>
<link rel="stylesheet" href="css/reset.css"/><link rel="stylesheet" href="css/core.css"/>
<link rel="stylesheet" href="css/components/header-nav.css"/><link rel="stylesheet" href="css/components/site-footer.css"/>
<link rel="stylesheet" href="css/components/pagination.css"/><link rel="stylesheet" href="css/custom.css"/>
</head><body>
<a href="#main" class="skip-link">Skip to main content</a>
<header class="site-header"><div class="site-header__inner container">
<a href="#" class="site-header__brand">Framework</a>
<button type="button" class="site-header__toggle" popovertarget="site-nav" aria-label="Open menu">
<span aria-hidden="true">☰</span><span class="visually-hidden">Menu</span></button>
<nav id="site-nav" class="site-nav" popover aria-label="Main navigation">
<a href="#" class="site-nav__link">Components</a>
</nav></div></header>
<main id="main"><section class="container section stack">
<header class="section-header stack"><span class="section-header__eyebrow">Component</span>
<h1 class="section-header__title">Pagination</h1>
<p class="section-header__intro">A navigation landmark of page links. Mark the current page with <code>aria-current="page"</code>.</p></header>
<section class="stack"><h2>Standard</h2>
<nav class="pagination" aria-label="Search results pages">
<a href="#" class="pagination__item" aria-disabled="true">‹ Prev</a>
<a href="#" class="pagination__item" aria-current="page">1</a>
<a href="#" class="pagination__item">2</a><a href="#" class="pagination__item">3</a><a href="#" class="pagination__item">4</a>
<a href="#" class="pagination__item">Next ›</a>
</nav></section>
<section class="stack"><h2>With ellipsis</h2>
<nav class="pagination" aria-label="Catalog pages">
<a href="#" class="pagination__item">‹ Prev</a><a href="#" class="pagination__item">1</a><a href="#" class="pagination__item">2</a>
<span class="pagination__ellipsis" aria-hidden="true">…</span>
<a href="#" class="pagination__item" aria-current="page">7</a>
<span class="pagination__ellipsis" aria-hidden="true">…</span>
<a href="#" class="pagination__item">23</a><a href="#" class="pagination__item">Next ›</a>
</nav></section>
</section></main>
<footer class="site-footer"><div class="container"><p class="text-muted text-center">Framework demo · Pagination</p></div></footer>
</body></html>
