<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark light" />
  <title>Hero Split Variant</title>

  <!--
  Hero Split Variant

  This HTML file uses:
  - css/reset.css
  - css/core.css
  - css/components/hero-split.css
  - css/custom.css
  -->

  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/core.css" />
  <link rel="stylesheet" href="css/components/hero-split.css" />
  <link rel="stylesheet" href="css/custom.css" />
</head>
<body>
  <a href="#main" class="skip-link">Skip to main content</a>

  <main id="main" class="container section stack">
    <figure class="hero-split grid items-center">
      <img
        class="hero-split__media"
        src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?q=80&w=1600&auto=format&fit=crop"
        alt="A modern workspace"
        decoding="async"
        fetchpriority="high"
      />

      <figcaption class="hero-split__copy stack">
        <h1 class="page-title">Design Systems that Scale.</h1>
        <p class="page-lead">Build faster, cleaner, and more accessible interfaces.</p>
        <nav class="cluster" aria-label="Hero actions">
          <a href="#" class="btn btn--primary">Explore the System</a>
          <a href="#" class="btn btn--secondary">Contact Us</a>
        </nav>
      </figcaption>
    </figure>

    <figure class="hero-split grid items-center">
      <figcaption class="hero-split__copy stack">
        <h2 class="page-title">Swap the columns to flip the sides.</h2>
        <p class="page-lead">To place the text on the left and the image on the right, just swap the order of the two children. No additional CSS is needed.</p>
        <nav class="cluster" aria-label="Hero actions">
          <a href="#" class="btn btn--primary">Learn More</a>
          <a href="#" class="btn btn--secondary">View Example</a>
        </nav>
      </figcaption>

      <img
        class="hero-split__media"
        src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=1600&auto=format&fit=crop"
        alt="A scenic mountain road"
        decoding="async"
        loading="lazy"
      />
    </figure>
  </main>
</body>
</html>
