<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark light" />
  <title>Gallery</title>
  <!--
  Gallery

  This HTML file uses:
  - css/reset.css
  - css/core.css
  - css/components/gallery.css
  - css/custom.css
  -->
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/core.css" />
  <link rel="stylesheet" href="css/components/gallery.css" />
  <link rel="stylesheet" href="css/custom.css" />
</head>
<body>
  <a href="#main" class="skip-link">Skip to main content</a>

  <main id="main" class="container section stack">
    <header class="section-header stack">
      <span class="section-header__eyebrow">Gallery</span>
      <h1 class="section-header__title">Gallery only demo</h1>
      <p class="section-header__intro">This page shows the gallery styling without any lightbox behaviour.</p>
    </header>

    <ul class="gallery">
      <li class="gallery__item">
        <figure>
          <div class="gallery__frame">
            <img class="gallery__image" src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=900&auto=format&fit=crop" alt="City skyline at dusk"  loading="lazy" />
          </div>
          <figcaption class="gallery__caption">City skyline at dusk</figcaption>
        </figure>
      </li>
      <li class="gallery__item">
        <figure>
          <div class="gallery__frame">
            <img class="gallery__image" src="https://images.unsplash.com/photo-1500534623283-312aade485b7?q=80&w=900&auto=format&fit=crop" alt="Forest path in soft morning light"  loading="lazy" />
          </div>
          <figcaption class="gallery__caption">Forest path in soft morning light</figcaption>
        </figure>
      </li>
      <li class="gallery__item">
        <figure>
          <div class="gallery__frame">
            <img class="gallery__image" src="https://images.unsplash.com/photo-1519681393784-d120267933ba?q=80&w=900&auto=format&fit=crop" alt="Notebook and tools on a desk"  loading="lazy" />
          </div>
          <figcaption class="gallery__caption">Notebook and tools on a desk</figcaption>
        </figure>
      </li>
    </ul>
  </main>
</body>
</html>
