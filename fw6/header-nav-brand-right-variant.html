<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark light" />
  <title>Header Nav Brand Right Variant</title>
  <!--
  Header Nav Brand Right Variant

  Swapped layout: nav appears on the LEFT and brand on the RIGHT on desktop.
  Achieved purely by putting .site-nav before .site-header__brand in the HTML —
  no extra classes or CSS overrides required.

  Mobile behaviour is unchanged: the toggle opens a left-side drawer.
  Add class="site-header drawer-right" for a right-side drawer instead.

  This HTML file uses:
  - css/reset.css
  - css/core.css
  - css/components/header-nav.css
  - css/custom.css
  -->
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/core.css" />
  <link rel="stylesheet" href="css/components/header-nav.css" />
  <link rel="stylesheet" href="css/custom.css" />
</head>
<body>
  <a href="#main" class="skip-link">Skip to main content</a>
  <header class="site-header">
    <div class="site-header__inner container">
      <button type="button" class="site-header__toggle" popovertarget="site-nav" aria-label="Open menu">
        <span aria-hidden="true">☰</span>
        <span class="visually-hidden">Menu</span>
      </button>
      <nav id="site-nav" class="site-nav" popover aria-label="Main navigation">
        <a href="#" class="site-nav__link">Home</a>
        <a href="#" class="site-nav__link">Work</a>
        <a href="#" class="site-nav__link">About</a>
        <a href="#" class="site-nav__link site-nav__link--cta">Get Started</a>
      </nav>
      <a href="#" class="site-header__brand">Agency.io</a>
    </div>
  </header>
  <main id="main" class="container section stack">
    <h1>Brand-right nav example</h1>
    <p class="text-muted">Nav on the left, brand on the right — achieved by markup order alone.</p>
  </main>
</body>
</html>
