<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark light" />
  <title>Header Nav Dropdown Variant</title>
  <!--
  Header Nav Dropdown Variant
  
  This HTML file uses:
  - css/reset.css
  - css/core.css
  - css/components/header-nav.css
  - css/components/header-nav-dropdown-addon.css
  - css/custom.css
  -->
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/core.css" />
  <link rel="stylesheet" href="css/components/header-nav.css" />
  <link rel="stylesheet" href="css/components/header-nav-dropdown-addon.css" />
  <link rel="stylesheet" href="css/custom.css" />
</head>
<body>
  <a href="#main" class="skip-link">Skip to main content</a>
  <header class="site-header drawer-right">
    <div class="site-header__inner container">
      <a href="#" class="site-header__brand">Agency.io</a>
      <button type="button" class="site-header__toggle" popovertarget="site-nav" aria-label="Open menu">
        <span aria-hidden="true">☰</span>
        <span class="visually-hidden">Menu</span>
      </button>
      <nav id="site-nav" class="site-nav" popover aria-label="Main navigation">
        <a href="#" class="site-nav__link">Home</a>
        <details class="site-nav__submenu-container">
          <summary class="site-nav__submenu-toggle">Components ▾</summary>
          <ul class="site-nav__submenu">
            <li><a href="#">Carousel</a></li>
            <li><a href="#">Gallery</a></li>
            <li><a href="#">Lightbox</a></li>
          </ul>
        </details>
        <details class="site-nav__submenu-container">
          <summary class="site-nav__submenu-toggle">Company ▾</summary>
          <ul class="site-nav__submenu">
            <li><a href="#">About</a></li>
            <li><a href="#">Team</a></li>
            <li><a href="#">Contact</a></li>
          </ul>
        </details>
        <a href="#" class="site-nav__link site-nav__link--cta">Get Started</a>
      </nav>
    </div>
  </header>
  <main id="main" class="container section stack">
    <h1>Fixed desktop nav dropdown example</h1>
    <p class="text-muted">Framework-native dropdown markup using details and summary.</p>
  </main>
</body>
</html>
